---
services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Domain\UseCase\Command\:
    resource: '%kernel.project_dir%/src/Domain/UseCase/Command/**/Handler.php'
    tags:
      - { name: messenger.message_handler, bus: command.bus }

  Domain\UseCase\Query\:
    resource: '%kernel.project_dir%/src/Domain/UseCase/Query/**/Handler.php'
    tags:
      - { name: messenger.message_handler, bus: query.bus }
